name: Release (Maestra)

# Builds the Kargo container image with Maestra patches on top of an upstream
# tag and publishes it to the Maestra ECR. Triggered by pushing a tag of the
# form vX.Y.Z-maestra.N (matching the upstream tag the patches sit atop).
#
# Authenticates to ECR via the Teleport workload identity bot registered in
# maestra-io/fluxcd as `image-push-github-actions-kargo-akuity` -- no static
# AWS credentials are stored in this repo.

on:
  push:
    tags:
      - 'v*-maestra.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ECR_REGISTRY: 515260921971.dkr.ecr.eu-central-1.amazonaws.com
  ECR_REPO: kargo
  AWS_REGION: eu-central-1
  TELEPORT_FQDN: teleport.maestra.io:443
  TELEPORT_TOKEN: image-push-github-actions-kargo-akuity
  AWS_ROLE_ARN: arn:aws:iam::515260921971:role/teleport-image-push

jobs:
  publish-image:
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:3.0.0
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v6

      - name: Get Teleport version
        id: tp-version
        run: |
          VERSION=$(curl -sf "https://${TELEPORT_FQDN}/webapi/find" | jq -r '.auto_update.tools_version // .server_version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Teleport binaries
        uses: actions/cache@v5
        with:
          path: ${{ runner.tool_cache }}/teleport
          key: teleport-${{ steps.tp-version.outputs.version }}-${{ runner.os }}-${{ runner.arch }}

      - name: Install Teleport
        uses: teleport-actions/setup@v1
        with:
          version: ${{ steps.tp-version.outputs.version }}
          proxy: ${{ env.TELEPORT_FQDN }}

      - name: ECR login via Teleport Workload Identity
        run: |
          cat > /tmp/tbot.yaml << EOF
          version: v2
          proxy_server: ${TELEPORT_FQDN}
          onboarding:
            join_method: github
            token: ${TELEPORT_TOKEN}
          oneshot: true
          storage:
            type: memory
          services:
            - type: workload-identity-jwt
              destination:
                type: directory
                path: /tmp/tbot-output
              selector:
                name: image-push
              audiences: ["sts.amazonaws.com"]
          EOF

          mkdir -p /tmp/tbot-output
          tbot start -c /tmp/tbot.yaml || true
          test -f /tmp/tbot-output/jwt_svid

          pip install -q awscli
          export AWS_WEB_IDENTITY_TOKEN_FILE=/tmp/tbot-output/jwt_svid
          export AWS_ROLE_ARN="${AWS_ROLE_ARN}"
          export AWS_DEFAULT_REGION="${AWS_REGION}"

          aws ecr get-login-password --region "${AWS_REGION}" | \
            docker login "${ECR_REGISTRY}" --username AWS --password-stdin

          aws ecr describe-repositories --repository-names "${ECR_REPO}" --region "${AWS_REGION}" 2>/dev/null || \
            aws ecr create-repository --repository-name "${ECR_REPO}" --region "${AWS_REGION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host

      - name: Build base image
        # Upstream's release flow: build kargo-base via apko, push to a
        # localhost registry, then have the main Dockerfile consume it via
        # --build-arg BASE_IMAGE. See akuity/kargo .github/workflows/release.yaml.
        run: |
          BASE_IMAGE=localhost:5000/kargo-base make build-base-image
          docker push localhost:5000/kargo-base:latest-amd64
          docker push localhost:5000/kargo-base:latest-arm64

      - name: Build and push final image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=localhost:5000/kargo-base
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            GIT_TREE_STATE=clean
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ github.ref_name }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
